<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Test Reports Portal</title>

    <style>
      * {
        box-sizing: border-box;
      }

      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 32px;
        background: #f5f5f5;
        color: #333;
      }

      h1 {
        margin-top: 0;
        margin-bottom: 8px;
      }

      .subtitle {
        color: #666;
        margin-bottom: 32px;
      }

      .category {
        margin-bottom: 32px;
      }

      .category-title {
        font-size: 20px;
        font-weight: bold;
        margin-bottom: 12px;
      }

      .reports {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 12px;
      }

      .report-card {
        background: white;
        border: 1px solid #ddd;
        border-radius: 10px;
        padding: 16px;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .report-card:hover {
        transform: translateY(-2px);
        background: #eef5ff;
        border-color: #4a90e2;
      }

      .action-btn {
        flex: 1;
        border: none;
        border-radius: 6px;
        padding: 10px;
        cursor: pointer;
        font-weight: bold;
        transition: 0.2s;
      }

      .html-btn {
        background: #4a90e2;
        color: white;
      }

      .html-btn:hover {
        background: #357bd8;
      }

      .json-btn {
        background: #5c6bc0;
        color: white;
      }

      .json-btn:hover {
        background: #4558b5;
      }

      .report-name {
        font-weight: bold;
        margin-bottom: 6px;
      }

      .report-path {
        font-size: 12px;
        color: #777;
        word-break: break-all;
      }

      .loading,
      .error {
        padding: 16px;
        background: white;
        border-radius: 8px;
      }

      .error {
        color: red;
      }
    </style>
  </head>

  <body>
    <h1>Test Reports Portal</h1>
    <div class="subtitle">Browse and open generated test reports.</div>

    <div id="content" class="loading">Loading repository...</div>

    <script>
      const USER = "josegonzales22";
      const REPO = "Lighthouse-Flow-Template";

      const API_BASE = `https://api.github.com/repos/${USER}/${REPO}/contents`;

      const PAGES_BASE = `https://${USER}.github.io/${REPO}`;

      async function getContents(path = "") {
        const url = path ? `${API_BASE}/${path}` : API_BASE;

        const response = await fetch(url);

        if (!response.ok) {
          throw new Error(
            `Unable to load repository content (${response.status})`,
          );
        }

        return response.json();
      }

      function createReportCard(deviceName, htmlUrl, jsonUrl) {
        const card = document.createElement("div");

        card.className = "report-card";

        card.innerHTML = `
    <div class="report-name">${deviceName}</div>

    <div style="
      display:flex;
      gap:8px;
      margin-top:12px;
    ">
      ${
        htmlUrl
          ? `
            <button class="action-btn html-btn">
              Open HTML
            </button>
          `
          : ""
      }

      ${
        jsonUrl
          ? `
            <button class="action-btn json-btn">
              Open JSON
            </button>
          `
          : ""
      }
    </div>
  `;

        const htmlButton = card.querySelector(".html-btn");
        const jsonButton = card.querySelector(".json-btn");

        if (htmlButton) {
          htmlButton.addEventListener("click", (e) => {
            e.stopPropagation();
            window.open(htmlUrl, "_blank");
          });
        }

        if (jsonButton) {
          jsonButton.addEventListener("click", (e) => {
            e.stopPropagation();
            window.open(jsonUrl, "_blank");
          });
        }

        return card;
      }

      async function loadPortal() {
        const content = document.getElementById("content");

        try {
          content.innerHTML = "";

          const deviceFolders = await getContents("reports");

          const folders = deviceFolders.filter((item) => item.type === "dir");

          if (folders.length === 0) {
            content.innerHTML =
              "<div class='error'>No report folders found.</div>";
            return;
          }

          for (const folder of folders) {
            const section = document.createElement("div");
            section.className = "category";

            const title = document.createElement("div");
            title.className = "category-title";

            title.textContent =
              folder.name.charAt(0).toUpperCase() + folder.name.slice(1);

            const reportsContainer = document.createElement("div");
            reportsContainer.className = "reports";

            const folderItems = await getContents(folder.path);

            const htmlFile = folderItems.find(
              (item) =>
                item.type === "file" &&
                item.name.toLowerCase().endsWith(".html"),
            );

            const jsonFile = folderItems.find(
              (item) =>
                item.type === "file" &&
                item.name.toLowerCase().endsWith(".json"),
            );

            if (htmlFile || jsonFile) {
              reportsContainer.appendChild(
                createReportCard(
                  folder.name.toUpperCase(),
                  htmlFile ? `${PAGES_BASE}/${htmlFile.path}` : null,
                  jsonFile ? `${PAGES_BASE}/${jsonFile.path}` : null,
                ),
              );
            }

            if (reportsContainer.children.length > 0) {
              section.appendChild(title);
              section.appendChild(reportsContainer);
              content.appendChild(section);
            }
          }

          if (content.children.length === 0) {
            content.innerHTML = "<div class='error'>No reports found.</div>";
          }
        } catch (error) {
          console.error(error);
          content.innerHTML = `<div class="error">${error.message}</div>`;
        }
      }

      loadPortal();
    </script>
  </body>
</html>
